name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3-dev python3-setuptools python3-venv libffi-dev libssl-dev zip unzip openjdk-17-jdk
      
      - name: Install Buildozer
        run: |
          pip install buildozer cython
      
      - name: Build APK
        run: |
          yes | buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
